# ============================================
# 标标 AI — Docker Compose 部署配置
# 一键启动: docker compose up -d
# ============================================

services:
  # ---- PostgreSQL + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: biaobiao-pg
    environment:
      POSTGRES_USER: biaobiao
      POSTGRES_PASSWORD: biaobiao123
      POSTGRES_DB: biaobiao
    ports:
      - "${PG_PORT:-5434}:5432"
    volumes:
      - biaobiao_pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biaobiao"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: biaobiao-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- 后端 API (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biaobiao-api
    ports:
      - "${API_PORT:-8001}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://biaobiao:biaobiao123@postgres:5432/biaobiao
      DATABASE_URL_SYNC: postgresql://biaobiao:biaobiao123@postgres:5432/biaobiao
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ---- 前端 (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biaobiao-web
    ports:
      - "${FE_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:${API_PORT:-8001}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  biaobiao_pgdata:
