# 标标 AI — Alembic 配置
[alembic]
script_location = alembic
# DB URL 由 alembic/env.py 从环境变量 DATABASE_URL 读取
# sqlalchemy.url = postgresql://biaobiao:biaobiao123@localhost:5434/biaobiao

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
