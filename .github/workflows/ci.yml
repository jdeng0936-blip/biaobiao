# ============================================
# 标标 AI — GitHub Actions CI
# 每次 push / PR 自动运行后端 pytest + 前端 tsc
# ============================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── 后端单元测试 ───
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        env:
          # 测试用 dummy URL（psycopg2 格式兼容，但不实际连接）
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_test"
          GEMINI_API_KEY: "test-dummy-key"
        run: |
          python -m pytest \
            test_api_integration.py \
            test_generate.py \
            test_pipeline.py \
            test_llm_provider.py \
            test_variant.py \
            test_knowledge_api.py \
            test_storage.py \
            test_craft_auth_scoring.py \
            test_project.py \
            test_export_docx.py \
            test_embedding.py \
            test_anti_review.py \
            test_desensitize.py \
            test_feedback_service.py \
            test_rag.py \
            test_llm.py \
            -v --tb=short

  # ─── 前端类型检查 ───
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit
